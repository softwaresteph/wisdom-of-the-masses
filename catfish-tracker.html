<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catfishing Group Tracker</title>
  <style>
    :root {
      --bg: #f0f7ff;
      --card: #ffffff;
      --primary: #2a7ae4;
      --primary-dark: #1a5cbf;
      --text: #1a2233;
      --muted: #6b7a99;
      --border: #d0dced;
      --group-bg: #eaf3ff;
      --danger-text: #cc3333;
      --green: #1a9e5c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      max-width: 860px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }

    /* File status bar */
    .file-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }
    .file-bar .file-label { color: var(--muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-bar .file-label.connected { color: var(--green); font-weight: 600; }
    .file-bar .file-label.fallback { color: var(--muted); font-style: italic; }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .row { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 120px; }
    .form-group.wide { flex: 3; min-width: 200px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    input[type=text], textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type=text]:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(42,122,228,0.12);
    }
    textarea { resize: vertical; min-height: calc(1.5em * 4 + 16px); line-height: 1.5; }
    textarea::placeholder { opacity: 0.5; }

    /* Buttons */
    button {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-sm {
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
    }
    .btn-sm:hover { background: #d6d6d6; }
    .btn-sm-danger {
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
    }
    .btn-sm-danger:hover { background: #fff0f0; color: var(--danger-text); border-color: var(--danger-text); }
    .btn-sm-red {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--danger-text);
      font-size: 0.9rem;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }
    .btn-sm-red:hover { background: #fff0f0; }

    .error-msg { color: var(--danger-text); font-size: 0.85rem; margin-top: 10px; display: none; }
    .actions-row { display: flex; gap: 8px; margin-top: 14px; align-items: center; flex-wrap: wrap; }

    /* Day nav */
    .day-nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .day-nav select { width: auto; font-weight: 600; }

    /* Results table */
    .results-wrap { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; table-layout: fixed; }
    th {
      text-align: center;
      padding: 0 15px;
      height: 42px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    th.col-name { text-align: left; padding-left: 2px; width: 120px; }
    td { padding: 0 15px; height: 42px; text-align: center; font-size: 1.15rem; vertical-align: middle; }
    td.col-name { text-align: left; font-weight: 600; font-size: 0.9rem; white-space: nowrap; padding-left: 2px; }
    .col-score { width: 55px; }
    td.col-score { font-size: 0.82rem; color: var(--muted); font-weight: 700; white-space: nowrap; }
    .col-q { width: 48px; text-align: center; padding-left: 2px; padding-right: 2px; }
    .col-del { padding: 4px; white-space: nowrap; width: 90px; }
    tbody tr:not(.group-row):hover td { background: var(--bg); }
    tr.group-row td { background: var(--group-bg); border-top: 2px solid var(--border); }
    tr.group-row td.col-name { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--primary); }
    tr.group-row td.col-score { color: var(--primary); font-size: 0.85rem; }

    .empty-msg { text-align: center; color: var(--muted); padding: 36px 16px; font-size: 0.9rem; }

    /* Awards section */
    .awards-table { border-collapse: collapse; width: 100%; }
    .awards-table td { padding: 4px 15px; vertical-align: middle; border: none; text-align: start; }
    .award-emoji { font-size: 1.4rem; width: 40px; }
    .award-text { font-size: 0.95rem; color: var(--text); }

    /* Hidden import input */
    #import-input { display: none; }

    @media (max-width: 500px) {
      .row { flex-direction: column; align-items: stretch; }
      td { font-size: 1rem; padding: 6px 3px; }
      .btn-sm, .btn-sm-danger, .btn-sm-success, .btn-sm-cancel { padding: 4px 6px; }
    }
  /* --- Row edit mode --- */
  .name-edit-input {
    font-size: 0.9rem;
    font-weight: 600;
    font-family: inherit;
    color: var(--text);
    background: white;
    border: 1px solid var(--primary);
    border-radius: 5px;
    padding: 2px 6px;
    width: 110px;
    outline: none;
    box-shadow: 0 0 0 3px rgba(42,122,228,0.12);
  }
  .emoji-select {
    font-size: 1rem;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 1px 2px;
    background: white;
    cursor: pointer;
    width: 2.8rem;
  }
  tr.editing-row td { background: #f0f6ff; }
  tr.editing-row td:not(.col-q):not(.col-del) { padding-left: 6px; padding-right: 6px; }

  .btn-sm:hover { background: #d6d6d6; }

  .btn-sm-success {
    background: #28a745;
    color: white;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    font-family: inherit;
  }
  .btn-sm-success:hover { background: #218838; }

  .btn-sm-cancel {
    background: #6c757d;
    color: white;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    font-family: inherit;
  }
  .btn-sm-cancel:hover { background: #5a6268; }

  </style>
</head>
<body>

<h1>🎣 Catfishing Group Tracker</h1>

<!-- File status bar -->
<div class="file-bar" id="file-bar">
  <span class="file-label" id="file-label">No file open</span>
  <button class="btn-sm" id="btn-open-file" onclick="openFile()">📂 Open scores.json</button>
  <!-- Fallback: shown only when File System Access API is unavailable -->
  <button class="btn-sm" id="btn-import" onclick="document.getElementById('import-input').click()" style="display:none">📥 Import JSON</button>
  <button class="btn-sm" id="btn-export" onclick="exportJSON()" style="display:none">📤 Export JSON</button>
  <input type="file" id="import-input" accept=".json" onchange="importJSON(event)" />
</div>

<!-- Add Score -->
<div class="card">
  <div class="card-title">Add Score</div>
  <div class="row">
    <div class="form-group">
      <label for="inp-name">Name</label>
      <input type="text" id="inp-name" placeholder="e.g. Ali" autocomplete="off" />
    </div>
    <div class="form-group wide">
      <label for="inp-score">Paste share text</label>
      <textarea id="inp-score" placeholder="catfishing.net &#10;#626 - 5/10&#10;🐈🐟🐟🐟🐈&#10;🐈🐈🐟🐈🐟"></textarea>
    </div>
  </div>
  <div id="error-msg" class="error-msg"></div>
  <div class="actions-row">
    <button class="btn-primary" onclick="addScore()">Add Score</button>
    <button class="btn-ghost" onclick="clearForm()">Clear</button>
  </div>
</div>

<!-- Results -->
<div class="card">
  <div class="day-nav">
    <div class="card-title" style="margin:0">Results</div>
    <select id="puzzle-sel" onchange="render()"></select>
    <button class="btn-sm-red" id="btn-del-day" onclick="deleteDay()" style="display:none">Delete day</button>
  </div>
  <div class="results-wrap" id="results"></div>
</div>

<!-- Awards -->
<div class="card" id="awards-card" style="display:none">
  <div class="card-title">Awards</div>
  <div id="awards"></div>
</div>

<script>
  const CAT  = '\u{1F408}'; // 🐈
  const FISH = '\u{1F41F}'; // 🐟
  const EGG  = '\u{1F95A}'; // 🥚
  const VALID_EMOJIS = new Set([CAT, FISH, EGG]);

  // In-memory data + file handle
  let currentData = {};
  let fileHandle  = null;
  let _editingRow = null; // { key, name } | null — tracks which row is in edit mode
  const HAS_FSA   = typeof window.showOpenFilePicker === 'function';
  // In server mode, this is injected automatically as `${APP_PATH}/api`
  // (i.e. `/api` at the root, or `<subpath>/api` when served behind a subpath).
  const SERVER_URL = null;

  // --- IndexedDB: persist file handle across page loads ---
  function getDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('catfish_tracker', 1);
      req.onupgradeneeded = () => req.result.createObjectStore('handles');
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    });
  }
  async function saveHandleToIDB(handle) {
    try {
      const db = await getDB();
      await new Promise((res, rej) => {
        const tx = db.transaction('handles', 'readwrite');
        tx.objectStore('handles').put(handle, 'scores');
        tx.oncomplete = res;
        tx.onerror = () => rej(tx.error);
      });
    } catch {}
  }
  async function loadHandleFromIDB() {
    try {
      const db = await getDB();
      return await new Promise((res, rej) => {
        const tx = db.transaction('handles', 'readonly');
        const req = tx.objectStore('handles').get('scores');
        req.onsuccess = () => res(req.result || null);
        req.onerror   = () => rej(req.error);
      });
    } catch { return null; }
  }

  // --- File access (File System Access API) ---
  async function openFile() {
    // If we already have a handle (e.g. after a page refresh), try to re-request
    // permission before opening a new picker — this avoids having to re-select the file.
    if (fileHandle) {
      try {
        const perm = await fileHandle.requestPermission({ mode: 'readwrite' });
        if (perm === 'granted') {
          await loadFromHandle();
          return;
        }
      } catch {}
    }
    try {
      [fileHandle] = await window.showOpenFilePicker({
        types: [{ description: 'JSON scores file', accept: { 'application/json': ['.json'] } }],
        multiple: false,
        startIn: fileHandle || 'documents'
      });
      await loadFromHandle();
      await saveHandleToIDB(fileHandle);
    } catch (e) {
      if (e.name !== 'AbortError') showError('Could not open file: ' + e.message);
    }
  }

  async function loadFromHandle() {
    const file = await fileHandle.getFile();
    const text = await file.text();
    currentData = text.trim() ? JSON.parse(text) : {};
    updateFileBar();
    refreshSelect(sortedKeys(currentData)[0] || null);
    render();
  }

  async function saveToFile() {
    if (!fileHandle) return;
    try {
      // Request write permission if needed
      const perm = await fileHandle.requestPermission({ mode: 'readwrite' });
      if (perm !== 'granted') { showError('Write permission denied.'); return; }
      const writable = await fileHandle.createWritable();
      await writable.write(JSON.stringify(currentData, null, 2) + '\n');
      await writable.close();
    } catch (e) {
      showError('Could not save file: ' + e.message);
    }
  }

  // --- Fallback: export / import ---
  function exportJSON() {
    const blob = new Blob([JSON.stringify(currentData, null, 2) + '\n'], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'scores.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        currentData = JSON.parse(e.target.result) || {};
        updateFileBar(file.name);
        refreshSelect(sortedKeys(currentData)[0] || null);
        render();
      } catch {
        showError('Could not parse JSON file.');
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  // --- Server I/O ---
  async function loadFromServer() {
    const res = await fetch(SERVER_URL + '/scores');
    if (!res.ok) throw new Error('Server returned ' + res.status);
    currentData = await res.json();
  }

  async function saveToServer() {
    const res = await fetch(SERVER_URL + '/scores', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(currentData)
    });
    if (!res.ok) throw new Error('Server save failed: ' + res.status);
  }

  // --- Unified save ---
  async function persist() {
    if (SERVER_URL) {
      try {
        await saveToServer();
      } catch (err) {
        console.error(err);
        showError('Could not save to server. Please check your connection and try again.');
      }
      return;
    }
    if (HAS_FSA && fileHandle) {
      await saveToFile();
    }
    // Always keep a localStorage backup
    localStorage.setItem('catfish_data', JSON.stringify(currentData));
  }

  // --- Update file bar UI ---
  async function updateFileBar(fallbackName) {
    const label   = document.getElementById('file-label');
    const btnOpen = document.getElementById('btn-open-file');
    if (SERVER_URL) {
      label.textContent = '⚡ Server storage — changes sync automatically';
      label.className   = 'file-label connected';
      btnOpen.style.display = 'none';
      document.getElementById('btn-import').style.display = 'none';
      document.getElementById('btn-export').style.display = 'none';
      return;
    }
    if (HAS_FSA && fileHandle) {
      const perm = await fileHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        label.textContent   = '✓ ' + fileHandle.name;
        label.className     = 'file-label connected';
        btnOpen.textContent = '📂 Change file';
      } else {
        label.textContent   = fileHandle.name + ' — click to reconnect';
        label.className     = 'file-label fallback';
        btnOpen.textContent = '📂 Open scores.json';
      }
    } else if (fallbackName) {
      label.textContent = fallbackName + ' (imported — use Export to save changes)';
      label.className   = 'file-label fallback';
    } else if (!HAS_FSA) {
      label.textContent = 'File System API not supported in this browser — use Import/Export';
      label.className   = 'file-label fallback';
    }
  }

  // --- Parsing ---
  function parseScore(text) {
    const puzzleMatch = text.match(/#(\d+)/);
    if (!puzzleMatch) return { error: 'Could not find a puzzle number (like #626) in the pasted text.' };
    const emojis = [];
    for (const ch of text) {
      if (VALID_EMOJIS.has(ch)) emojis.push(ch);
    }
    if (emojis.length !== 10) {
      return { error: `Found ${emojis.length} emoji${emojis.length === 1 ? '' : 's'} — expected exactly 10. Make sure you paste the complete share text.` };
    }
    return { puzzle: parseInt(puzzleMatch[1], 10), emojis };
  }

  // --- Group logic ---
  function calcGroupEmojis(entries) {
    return Array.from({ length: 10 }, (_, i) => {
      const col = entries.map(e => e.emojis[i]);
      if (col.includes(CAT)) return CAT;
      if (col.includes(EGG)) return EGG;
      return FISH;
    });
  }

  function calcScore(emojis) {
    const n = emojis.reduce((s, e) => s + (e === CAT ? 1 : e === EGG ? 0.5 : 0), 0);
    return `${n}/10`;
  }

  // --- Actions ---
  async function addScore() {
    const name = document.getElementById('inp-name').value.trim();
    const text = document.getElementById('inp-score').value.trim();

    if (!name) { showError('Please enter a name.'); return; }
    if (!text) { showError('Please paste a score.'); return; }

    const parsed = parseScore(text);
    if (parsed.error) { showError(parsed.error); return; }

    const key = String(parsed.puzzle);
    if (!currentData[key]) currentData[key] = [];

    if (currentData[key].some(e => e.name.toLowerCase() === name.toLowerCase())) {
      showError(`${name} already has a score for #${parsed.puzzle}. Delete it first to replace.`);
      return;
    }

    currentData[key].push({ name, score: calcScore(parsed.emojis), emojis: parsed.emojis });
    currentData[key].sort((a, b) => a.name.localeCompare(b.name));
    await persist();

    clearForm();
    refreshSelect(key);
    render();
  }

  async function deleteEntry(puzzle, name) {
    const key = String(puzzle);
    if (!currentData[key]) return;
    currentData[key] = currentData[key].filter(e => e.name !== name);
    if (currentData[key].length === 0) delete currentData[key];
    await persist();
    const keys = sortedKeys(currentData);
    refreshSelect(currentData[key] ? key : (keys[0] || null));
    render();
  }

  async function deleteDay() {
    const key = document.getElementById('puzzle-sel').value;
    if (!key || !confirm(`Delete all scores for puzzle #${key}?`)) return;
    delete currentData[key];
    await persist();
    const keys = sortedKeys(currentData);
    refreshSelect(keys[0] || null);
    render();
  }

  // --- UI helpers ---
  function sortedKeys(data) {
    return Object.keys(data).sort((a, b) => b - a);
  }

  function refreshSelect(selectKey) {
    const keys = sortedKeys(currentData);
    const sel  = document.getElementById('puzzle-sel');
    const btn  = document.getElementById('btn-del-day');
    if (keys.length === 0) {
      sel.innerHTML = '<option value="">— no scores yet —</option>';
      btn.style.display = 'none';
    } else {
      sel.innerHTML = keys
        .map(k => `<option value="${k}"${k === String(selectKey) ? ' selected' : ''}>#${k}</option>`)
        .join('');
      btn.style.display = 'inline-block';
    }
  }

  function render() {
    const key = document.getElementById('puzzle-sel').value;
    const el  = document.getElementById('results');
    const awardsCard = document.getElementById('awards-card');
    const awardsEl   = document.getElementById('awards');

    if (!key) {
      el.innerHTML = '<div class="empty-msg">No scores yet — paste a score above to get started!</div>';
      awardsCard.style.display = 'none';
      return;
    }

    const entries = currentData[key] || [];
    if (entries.length === 0) {
      el.innerHTML = '<div class="empty-msg">No scores for this puzzle.</div>';
      awardsCard.style.display = 'none';
      return;
    }

    const group  = calcGroupEmojis(entries);
    const gScore = calcScore(group);
    const qHdrs  = Array.from({ length: 10 }, (_, i) => `<th class="col-q">Q${i + 1}</th>`).join('');

    // Players who are the only one to get a particular question right
    const nerds = new Set();
    if (entries.length > 1) {
      for (let i = 0; i < 10; i++) {
        const solos = entries.filter(e => e.emojis[i] === CAT);
        if (solos.length === 1) nerds.add(solos[0].name);
      }
    }

    // Players with the highest/lowest score
    const scored = entries.filter(e => e.emojis?.length).map(e => ({ name: e.name, value: e.emojis.reduce((s, em) => s + (em === CAT ? 1 : em === EGG ? 0.5 : 0), 0) }));
    const topScore = scored.length ? Math.max(...scored.map(e => e.value)) : NaN;
    const bottomScore = scored.length ? Math.min(...scored.map(e => e.value)) : NaN;
    const kings = entries.length > 1 && scored.length ? new Set(scored.filter(e => e.value === topScore).map(e => e.name)) : new Set();
    const peaches = entries.length > 1 && scored.length ? new Set(scored.filter(e => e.value === bottomScore).map(e => e.name)) : new Set();
    // Kings take priority — no one can hold both crown and peach
    for (const name of kings) { peaches.delete(name); }

    const playerRows = entries.map(e => {
      const nameJ = JSON.stringify(e.name).replace(/"/g, '&quot;');
      const keyJ = JSON.stringify(key).replace(/"/g, '&quot;');
      const isEditing = _editingRow && _editingRow.key === key && _editingRow.name === e.name;
      const badges = `${kings.has(e.name) ? ' 👑' : ''}${nerds.has(e.name) ? ' 🤓' : ''}${peaches.has(e.name) ? ' 🍑' : ''}`;

      if (isEditing) {
        const emojiCells = e.emojis.map(em =>
          `<td class="col-q"><select class="emoji-select">${[CAT, EGG, FISH].map(opt =>
            `<option value="${opt}"${opt === em ? ' selected' : ''}>${opt}</option>`
          ).join('')}</select></td>`
        ).join('');
        return `
          <tr data-edit-key="${esc(key)}" data-edit-name="${esc(e.name)}" class="editing-row">
            <td class="col-name"><input class="name-edit-input" type="text" value="${esc(e.name)}"></td>
            ${emojiCells}
            <td class="col-score">${calcScore(e.emojis)}</td>
            <td class="col-del">
              <button class="btn-sm-success" title="Save" onclick="saveRowEdit(${keyJ}, ${nameJ})">✓</button>
              <button class="btn-sm-cancel" title="Cancel" onclick="cancelRowEdit()">✕</button>
            </td>
          </tr>`;
      }

      return `
        <tr>
          <td class="col-name">${esc(e.name)}${badges}</td>
          ${e.emojis.map(em => `<td class="col-q">${em}</td>`).join('')}
          <td class="col-score">${calcScore(e.emojis)}</td>
          <td class="col-del">
            <button class="btn-sm" title="Edit" onclick="startRowEdit(${keyJ}, ${nameJ})">✏️</button>
            <button class="btn-sm-danger" title="Remove" onclick="deleteEntry(${keyJ}, ${nameJ})">✕</button>
          </td>
        </tr>`;
    }).join('');

    el.innerHTML = `
      <table>
        <thead><tr>
          <th class="col-name">Player</th>${qHdrs}<th class="col-score">Score</th><th class="col-del"></th>
        </tr></thead>
        <tbody>
          ${playerRows}
          <tr class="group-row">
            <td class="col-name">Group</td>
            ${group.map(em => `<td class="col-q">${em}</td>`).join('')}
            <td class="col-score">${gScore}</td>
            <td></td>
          </tr>
        </tbody>
      </table>`;

    if (entries.length > 1) {
      const crownMsg = kings.size
        ? `${formatNames(kings)} ${kings.size > 1 ? 'are' : 'is'} the wisest of the masses!`
        : 'The throne sits empty — no one rose above the rest today.';
      const nerdMsg = nerds.size
        ? `${formatNames(nerds)} cracked it when no one else could`
        : 'No one had a paw up on the rest today — everyone shared the same blind spots!';
      const peachMsg = peaches.size
        ? `${formatNames(peaches)} ${peaches.size > 1 ? 'are' : 'is'} the bottom of the barrel today!`
        : 'No one is a rotten egg today!';

      awardsEl.innerHTML = `
        <table class="awards-table">
          <tbody>
            <tr><td class="award-emoji">👑</td><td class="award-text">${crownMsg}</td></tr>
            <tr><td class="award-emoji">🤓</td><td class="award-text">${nerdMsg}</td></tr>
            <tr><td class="award-emoji">🍑</td><td class="award-text">${peachMsg}</td></tr>
          </tbody>
        </table>`;
      awardsCard.style.display = 'block';
    } else {
      awardsCard.style.display = 'none';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function clearForm() {
    document.getElementById('inp-name').value  = '';
    document.getElementById('inp-score').value = '';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('inp-name').focus();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatNames(set) {
    const arr = [...set].map(n => `<strong>${esc(n)}</strong>`);
    if (arr.length === 0) return '';
    if (arr.length === 1) return arr[0];
    if (arr.length === 2) return `${arr[0]} and ${arr[1]}`;
    return arr.slice(0, -1).join(', ') + ` and ${arr[arr.length - 1]}`;
  }

  // --- Row edit mode ---
  function startRowEdit(key, name) {
    _editingRow = { key, name };
    render();
  }

  function cancelRowEdit() {
    _editingRow = null;
    render();
  }

  function saveRowEdit(key, playerName) {
    const entries = currentData[key] || [];
    const entry = entries.find(e => e.name === playerName);
    if (!entry) { render(); return; }

    const row = document.querySelector(
      `tr[data-edit-key="${CSS.escape(key)}"][data-edit-name="${CSS.escape(playerName)}"]`
    );
    if (!row) { render(); return; }

    const nameInput = row.querySelector('.name-edit-input');
    const newName = nameInput ? nameInput.value.trim() : playerName;

    if (!newName) {
      nameInput.style.borderColor = '#cc3333';
      nameInput.focus();
      return;
    }

    // Check for duplicate name (excluding self)
    if (newName.toLowerCase() !== playerName.toLowerCase() &&
        entries.some(e => e.name.toLowerCase() === newName.toLowerCase())) {
      nameInput.style.borderColor = '#cc3333';
      nameInput.title = `"${newName}" already exists for this puzzle`;
      nameInput.focus();
      return;
    }

    const selects = row.querySelectorAll('.emoji-select');
    const newEmojis = Array.from(selects).map(s => s.value);

    entry.name = newName;
    entry.emojis = newEmojis;
    entry.score = calcScore(newEmojis);
    entries.sort((a, b) => a.name.localeCompare(b.name));

    _editingRow = null;
    persist().then(() => render());
  }

  document.getElementById('inp-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inp-score').focus();
  });

  // --- Init ---
  async function init() {
    if (SERVER_URL) {
      updateFileBar();
      try {
        await loadFromServer();
      } catch (e) {
        showError('Could not load scores from server: ' + e.message);
        currentData = {};
      }
      refreshSelect(sortedKeys(currentData)[0] || null);
      render();
      return;
    }
    if (!HAS_FSA) {
      document.getElementById('btn-open-file').style.display = 'none';
      document.getElementById('btn-import').style.display    = 'inline-block';
      document.getElementById('btn-export').style.display    = 'inline-block';
      updateFileBar();
      // Load from localStorage for fallback browsers
      try {
        const cached = localStorage.getItem('catfish_data');
        if (cached) currentData = JSON.parse(cached);
      } catch {}
      refreshSelect(sortedKeys(currentData)[0] || null);
      render();
      return;
    }

    // Try to restore saved file handle and auto-load
    const saved = await loadHandleFromIDB();
    if (saved) {
      const perm = await saved.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        // Permission already held — load silently
        fileHandle = saved;
        await loadFromHandle();
        return;
      } else {
        // Have a handle but need to re-prompt — pre-populate so picker opens in same folder
        fileHandle = saved;
        updateFileBar(); // show the filename with a "reconnect" hint
      }
    }

    // No auto-load — show initial state from localStorage backup
    try {
      const cached = localStorage.getItem('catfish_data');
      if (cached) currentData = JSON.parse(cached);
    } catch {}
    refreshSelect(sortedKeys(currentData)[0] || null);
    render();
  }
  init();
</script>
</body>
</html>
